image: python:3.10

stages:
  - testing

run_unit_tests:
  stage: testing
  image: python:3.10
  before_script:
    - pip install virtualenv
    - virtualenv venv
    - source venv/bin/activate
    - pip install .[test]
    - pip install pytest-cov
  script:
    - coverage run -m pytest log_analyzer/src/tests/
    - coverage report -m
    - coverage xml
  artifacts:
    paths:
      - coverage.xml
    expire_in: 1 day
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  allow_failure: true

.base_ruff:
  stage: testing
  interruptible: true
  image:
    name: ghcr.io/astral-sh/ruff:0.9.1-alpine
  before_script:
    - cd $CI_PROJECT_DIR
    - ruff --version

Ruff Check:
  extends: .base_ruff
  script:
    - ruff check --output-format=gitlab > code-quality-report.json
  artifacts:
    reports:
      codequality: $CI_PROJECT_DIR/code-quality-report.json

Ruff Format:
  extends: .base_ruff
  script:
    - ruff format --diff